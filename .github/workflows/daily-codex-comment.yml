name: Daily Codex PR Review Ping

on:
  schedule:
    # 08:00 Beijing Time (UTC+8) = 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  daily-pr-and-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Prepare minimal daily change
        run: |
          mkdir -p .github
          TS_UTC="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          TS_CST="$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S %Z')"
          {
            echo "# Daily Codex Auto PR"
            echo
            echo "- UTC time: ${TS_UTC}"
            echo "- Beijing time: ${TS_CST}"
          } > .github/daily-codex-pr.md

      - name: Create daily PR
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'chore: daily codex auto pr marker'
          branch: chore/daily-codex-auto-pr-${{ github.run_id }}-${{ github.run_attempt }}
          delete-branch: false
          title: 'chore: daily codex auto PR'
          body: |
            This PR is automatically created by workflow at 08:00 Beijing time each day.

            It intentionally contains only a minimal update with current time info.
            No merge is required.
          labels: |
            codex-auto-ping

      - name: Ask Codex to review the PR
        if: steps.cpr.outputs.pull-request-number != '' && steps.cpr.outputs.pull-request-operation == 'created'
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = Number('${{ steps.cpr.outputs.pull-request-number }}')
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                '@codex Please review this auto-generated PR.',
                'Focus on quick sanity checks only; no code changes required.'
              ].join('\n')
            })
