name: Daily Codex Comment Ping

on:
  schedule:
    # 08:05 Beijing Time (UTC+8) = 00:05 UTC
    - cron: '5 0 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print action only, do not publish issue/comment'
        required: false
        default: 'false'

permissions:
  contents: read
  issues: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Post daily Codex ping comment
        uses: actions/github-script@v9
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        with:
          script: |
            const { run } = require('./.github/scripts/daily-codex-ping')

            const dryRun = String(process.env.DRY_RUN).toLowerCase() === 'true'

            await run({
              github,
              context,
              core,
              dryRun,
              now: new Date()
            })
