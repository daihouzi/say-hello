name: Daily Codex Ping

on:
  schedule:
    # 08:00 Beijing Time (UTC+8) = 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without creating comment'
        required: false
        type: boolean
        default: false
      issue_number:
        description: 'Optional issue number to comment on'
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Post daily Codex ping comment
        uses: actions/github-script@v7
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || '' }}
        with:
          script: |
            const { run } = require('./.github/scripts/daily-codex-ping.js')
            const dryRun = process.env.DRY_RUN === 'true'
            const issueNumber = process.env.ISSUE_NUMBER
            await run({ github, context, core, dryRun, issueNumber })
